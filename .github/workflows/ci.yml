name: CI

on:
  pull_request:
  push:
    branches: [dev, demo, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: TypeScript compile
        run: npm run build
      - name: Unit tests
        # config.ts exits if JWT_SECRET/DB_ENCRYPTION_KEY (each min 32 chars)
        # or ANTHROPIC_API_KEY are unset. Generate low-entropy placeholders
        # inline so gitleaks doesn't flag this file.
        run: |
          export ANTHROPIC_API_KEY=ci
          export JWT_SECRET=$(printf 'x%.0s' {1..40})
          export DB_ENCRYPTION_KEY=$(printf 'y%.0s' {1..40})
          export DEFAULT_ADMIN_PASSWORD=ci
          npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build (tsc -b && vite build)
        env:
          VITE_APP_TITLE: "Aktenanalyse (CI)"
        run: npm run build
