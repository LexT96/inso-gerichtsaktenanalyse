# Entwicklungsmodus: Code-Änderungen ohne Rebuild, Hot-Reload
# Start: docker compose -f docker-compose.dev.yml up
#
# Oder besser: Lokal ohne Docker (schneller, Debugger nutzbar):
#   cd backend && npm run dev
#   cd frontend && npm run dev
#
# Hinweis: TLS/HTTPS ist nur in docker-compose.yml (Produktion) via Traefik
# konfiguriert. Für lokale HTTPS-Tests ggf. selbstsignierte Zertifikate
# verwenden (z.B. mkcert) und den Vite/Express Dev-Server entsprechend
# konfigurieren.

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - EXTRACTION_MODEL=${EXTRACTION_MODEL:-claude-sonnet-4-6}
      - UTILITY_MODEL=${UTILITY_MODEL:-claude-haiku-4-5-20251001}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY:-15m}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY:-7d}
      - DATABASE_PATH=/app/data/insolvenz.db
      - UPLOAD_MAX_SIZE_MB=${UPLOAD_MAX_SIZE_MB:-50}
      - RATE_LIMIT_EXTRACTIONS_PER_HOUR=${RATE_LIMIT_EXTRACTIONS_PER_HOUR:-10}
      - DEFAULT_ADMIN_USERNAME=${DEFAULT_ADMIN_USERNAME:-admin}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
      - CORS_ORIGIN=http://localhost:3005
      - PORT=3004
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY}
    volumes:
      - ./backend/src:/app/src
      - ./standardschreiben:/app/standardschreiben
      - backend-data:/app/data
    restart: "no"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    ports:
      - "3005:3005"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - VITE_PROXY_TARGET=http://backend:3004
    depends_on:
      - backend
    restart: "no"

volumes:
  backend-data:
