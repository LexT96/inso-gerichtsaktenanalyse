services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "3004"
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - EXTRACTION_MODEL=${EXTRACTION_MODEL:-claude-sonnet-4-6}
      - UTILITY_MODEL=${UTILITY_MODEL:-claude-haiku-4-5-20251001}
      - EXTRACTION_PROVIDER=${EXTRACTION_PROVIDER:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.4}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_REASONING_EFFORT=${OPENAI_REASONING_EFFORT:-high}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY:-15m}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY:-7d}
      - DATABASE_PATH=/data/insolvenz.db
      - UPLOAD_MAX_SIZE_MB=${UPLOAD_MAX_SIZE_MB:-50}
      - RATE_LIMIT_EXTRACTIONS_PER_HOUR=${RATE_LIMIT_EXTRACTIONS_PER_HOUR:-10}
      - DEFAULT_ADMIN_USERNAME=${DEFAULT_ADMIN_USERNAME:-admin}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
      - CORS_ORIGIN=https://${DOMAIN_NAME}
      - PORT=3004
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DATA_RETENTION_HOURS=${DATA_RETENTION_HOURS:-72}
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_ALLOWED_DOMAINS=${AZURE_ALLOWED_DOMAINS:-}
    volumes:
      - db-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_AZURE_TENANT_ID=${VITE_AZURE_TENANT_ID:-}
        - VITE_AZURE_CLIENT_ID=${VITE_AZURE_CLIENT_ID:-}
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
  caddy-data:
  caddy-config:
